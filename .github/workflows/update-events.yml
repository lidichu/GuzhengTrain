name: 每月更新考級比賽資料

on:
  schedule:
    # 每月 1 日 01:00 UTC = 09:00 (Asia/Taipei)
    - cron: "0 1 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run(只預覽不 commit)"
        type: boolean
        default: false
      verbose:
        description: "印出完整 prompt 與 GPT 回應"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Run update script
        id: update
        working-directory: scripts
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          VERBOSE: ${{ inputs.verbose && '1' || '' }}
        run: node update-events.mjs

      - name: Commit changes
        if: steps.update.outputs.has_changes == 'true' && inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Certificates/events.json Certificates/index.html
          if git diff --staged --quiet; then
            echo "No staged changes, skipping commit"
          else
            git commit -m "自動更新考級比賽資料 ($(date -u +%Y-%m-%d))

          新增 ${{ steps.update.outputs.added }} 筆 / 更新 ${{ steps.update.outputs.updated }} 筆 / 移除 ${{ steps.update.outputs.removed }} 筆
          總計 ${{ steps.update.outputs.total }} 筆事件

          [skip ci]"
            git push
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `events.json 自動更新失敗 (${new Date().toISOString().slice(0,10)})`,
              body: [
                "本月排程的 events.json 更新失敗,請檢查:",
                "",
                `- [Workflow run](${runUrl})`,
                "- 常見原因:",
                "  - Replicate API token 失效 / 額度用完",
                "  - GPT 回傳格式錯誤(驗證失敗)",
                "  - 變動規模過大(> 30% 移除,被防護中止)",
                "",
                "手動補救方式:",
                "1. 在 Actions 頁面點 \"Run workflow\" 重跑",
                "2. 若一直失敗,先用 dry-run 模式檢查 GPT 輸出",
                "3. 必要時手動編輯 `Certificates/events.json`",
              ].join("\n"),
              labels: ["bug", "automated"],
            });
